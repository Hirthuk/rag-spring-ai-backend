#Actuator Configuration
#Expose ONLY the conditions endpoint along with defaults
management.endpoints.web.exposure.include=health,info,conditions

# Spring AI Bedrock Configuration - Claude 3 Sonnet
#spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.converse.model-id=us.anthropic.claude-3-sonnet-20240229-v1:0

# Performance optimizations - Claude 3 Sonnet (max output 4096 tokens)
# CRITICAL FIX: Options MUST be under .chat.options.* prefix (same as model) to apply!
# Temperature: Low for focused financial analysis
spring.ai.bedrock.converse.chat.options.temperature=0.15
# Max tokens: Claude 3 Sonnet hard limit is 4096 — use the full budget
spring.ai.bedrock.converse.chat.options.max-tokens=4096
# Top-p: Balanced for quality structured output
spring.ai.bedrock.converse.chat.options.top-p=0.85

# Memory optimization (adjust based on your needs)
# This controls the maximum conversation length in your MemoryService
finsight.memory.max-messages=3

# --- Logging: only FinSight application logs at INFO; suppress all framework noise ---
logging.level.root=WARN
logging.level.com.finsight.finsight_ai=INFO

# Suppress Spring AI and AWS SDK internals completely
logging.level.org.springframework.ai=WARN
logging.level.software.amazon.awssdk=WARN
logging.level.io.netty=WARN
logging.level.reactor.netty=WARN
logging.level.com.finsight.finsight_ai.service.memory=WARN
logging.level.com.finsight.finsight_ai.service.parser=WARN

