spring.application.name=finsight-ai

# ============================================================
# AWS Bedrock / Claude Configuration
# ============================================================
spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.converse.chat.enabled=true
# USING: Claude 3 Sonnet - only accessible Sonnet on this account (4.x are IAM-denied)
spring.ai.bedrock.converse.chat.options.model=us.anthropic.claude-3-sonnet-20240229-v1:0

# AWS credential profile — LOCAL DEV ONLY.
# Remove or leave unset in production; ECS task IAM role handles credentials.
# Local: set AWS_BEDROCK_PROFILE env var to your named profile, or set here directly.
# spring.ai.bedrock.aws.profile=<your-local-aws-profile>

# Overall API call timeout
spring.ai.bedrock.aws.timeout=6m

# Bedrock client timeout tuning (used by BedrockClientConfig custom clients)
finsight.bedrock.socket-timeout-seconds=300
finsight.bedrock.api-call-timeout-seconds=360
finsight.bedrock.connection-timeout-seconds=30

# ============================================================
# Vector Store (Chroma)
# ============================================================
spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration

spring.ai.bedrock.titan.embedding.enabled=false
spring.ai.bedrock.cohere.embedding.enabled=true
spring.ai.bedrock.cohere.embedding.options.input-type=SEARCH_DOCUMENT

spring.ai.bedrock.titan.embedding.model=amazon.titan-embed-text-v2:0
spring.ai.bedrock.titan.embedding.options.input-type=text

# Local=localhost. ECS sidecar=localhost (same Task). Standalone: set CHROMA_HOST.
spring.ai.vectorstore.chroma.host=${CHROMA_HOST:localhost}
spring.ai.vectorstore.chroma.port=8000
spring.ai.vectorstore.chroma.collection-name=financial-docs
spring.ai.vectorstore.chroma.tenant-id=SpringAiTenant
spring.ai.vectorstore.chroma.database-id=SpringAiDatabase
spring.ai.vectorstore.chroma.initialize-schema=true

# ============================================================
# File Upload Limits
# ============================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ============================================================
# CORS Configuration
# Production: set ALLOWED_ORIGINS to your CloudFront distribution URL in ECS Task Definition
#   (pull from Secrets Manager: finsight/prod/allowed-origins)
# Local default: http://localhost:5173
# ============================================================
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ============================================================
# Logging
# ============================================================
logging.level.root=WARN
logging.level.com.finsight.finsight_ai=INFO
logging.level.org.springframework.ai=WARN
logging.level.software.amazon.awssdk=WARN
logging.level.org.springframework.ai.bedrock.cohere=DEBUG
logging.level.io.netty=WARN
logging.level.reactor.netty=WARN
logging.level.com.finsight.finsight_ai.service.memory=WARN
logging.level.com.finsight.finsight_ai.service.parser=WARN

# ============================================================
# Tesseract OCR
# macOS (local): /opt/homebrew/lib  |  Linux container: /usr/lib
# Override via TESSERACT_LIB_PATH env var in ECS Task Definition
# ============================================================
spring.ai.tesseract.library.path=${TESSERACT_LIB_PATH:/opt/homebrew/lib}

# ============================================================
# Tavily Search API Key
# Production: inject TAVILY_API_KEY from Secrets Manager (finsight/prod/tavily-api-key)
# Local: set TAVILY_API_KEY env var

# ============================================================
tavily.api.key=${TAVILY_API_KEY}

# ============================================================
# AWS S3 Configuration
# ============================================================
aws.s3.bucket=finsight-ai-project

# ============================================================
# AWS Cognito Configuration
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.us-east-1.amazonaws.com/us-east-1_9WLoAw5x8

aws.cognito.region=us-east-1
aws.cognito.user-pool-id=us-east-1_9WLoAw5x8
aws.cognito.client-id=2sgi9nhq7e1b21ovav4dqggtkk

# Production: inject COGNITO_CLIENT_SECRET from Secrets Manager (finsight/prod/cognito-client-secret)
# Local: set COGNITO_CLIENT_SECRET env var
aws.cognito.client-secret=${COGNITO_CLIENT_SECRET}

# ============================================================
# AWS Pinpoint Configuration
# ============================================================
aws.pinpoint.region=us-east-1
aws.pinpoint.application-id=3aece72f809e41f498f60c539cf34278

# ============================================================
# Cookie Security — MUST be true in production (requires HTTPS)
# Production: ECS Task Definition sets COOKIE_SECURE=true
# Local: defaults to false (HTTP)
# ============================================================
finsight.cookie.secure=${COOKIE_SECURE:false}

# ============================================================
# Proxy / ALB Header Trust
# Production: ECS Task Definition sets FORWARD_HEADERS_STRATEGY=FRAMEWORK
#   (required so Spring detects HTTPS behind ALB for the Secure cookie flag)
# Local: defaults to NONE
# ============================================================
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:NONE}

# ============================================================
# Claude / Bedrock Model Settings
# ============================================================
spring.ai.bedrock.converse.model-id=us.anthropic.claude-3-sonnet-20240229-v1:0
spring.ai.bedrock.converse.chat.options.temperature=0.15
spring.ai.bedrock.converse.chat.options.max-tokens=4096
spring.ai.bedrock.converse.chat.options.top-p=0.85

# ============================================================
# Memory / Conversation
# ============================================================
finsight.memory.max-messages=3

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info
