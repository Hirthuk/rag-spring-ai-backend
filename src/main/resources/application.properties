spring.application.name=finsight-ai

# Claude Configuration (Bedrock Converse)
spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.converse.chat.enabled=true
spring.ai.bedrock.converse.chat.options.model=us.anthropic.claude-3-5-haiku-20241022-v1:0
spring.ai.bedrock.aws.profile=Restricted-limited-admin-877969058937
#spring.ai.bedrock.titan.embedding.model=amazon.titan-embed-text-v2:0

# Disable problematic autoconfiguration
#spring.autoconfigure.exclude=\
#org.springframework.ai.model.bedrock.titan.autoconfigure.BedrockTitanEmbeddingAutoConfiguration,\
#org.springframework.ai.model.bedrock.cohere.autoconfigure.BedrockCohereEmbeddingAutoConfiguration,\
#org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration
# Disable Titan to prevent the multimodal schema mismatch
spring.ai.bedrock.titan.embedding.enabled=false

# Enable Cohere (defaults to cohere.embed-english-v3)
spring.ai.bedrock.cohere.embedding.enabled=true

#spring.ai.bedrock.titan.embedding.model=amazon.titan-embed-text-v1
spring.ai.bedrock.titan.embedding.model=amazon.titan-embed-text-v2:0
spring.ai.bedrock.titan.embedding.options.input-type=text
# Chroma Configuration
spring.ai.vectorstore.chroma.host=localhost
spring.ai.vectorstore.chroma.port=8000
spring.ai.vectorstore.chroma.collection-name=financial-docs
spring.ai.vectorstore.chroma.tenant-id=SpringAiTenant
spring.ai.vectorstore.chroma.database-id=SpringAiDatabase
spring.ai.vectorstore.chroma.initialize-schema=true

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600


# Logging
logging.level.com.finsight.finsight_ai.service.ChatService=DEBUG

spring.ai.tesseract.library.path=/opt/homebrew/lib

tavily.api.key=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
# This stops Ollama from competing to be the default ChatModel


#AWS Configuration
AWS_PROFILE=Restricted-limited-admin-877969058937

#Debug Properties
#debug=true
#logging.level.org.springframework.ai=DEBUG
#logging.level.software.amazon.awssdk=DEBUG
#logging.level.org.springframework.boot.autoconfigure=DEBUG

#Actuator Configuration
#Expose ONLY the conditions endpoint along with defaults
management.endpoints.web.exposure.include=health,info,conditions

# Spring AI Bedrock Configuration
#spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.converse.model-id=anthropic.claude-3-haiku-20240307-v1:0

# Performance optimizations
spring.ai.bedrock.converse.options.temperature=0.3
spring.ai.bedrock.converse.options.max-tokens=2000
spring.ai.bedrock.converse.options.top-p=0.9

# Memory optimization (adjust based on your needs)
# This controls the maximum conversation length in your MemoryService
finsight.memory.max-messages=3

# Logging for debugging
logging.level.com.finsight.finsight_ai.service.memory=DEBUG
logging.level.com.finsight.finsight_ai.service.parser=DEBUG